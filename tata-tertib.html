<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tata Tertib Sekolah - MTs Al Fatah Talun</title>
    <link rel="icon" type="image/x-icon" href="mts.ico">
    <meta name="description" content="Tata Tertib Sekolah MTs Al Fatah Talun">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --primary-color: #2c5364;
            --accent-color: #00b4db;
            --text-main: #333;
            --text-muted: #666;
            --card-bg: #ffffff;
            --border-radius: 16px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            padding: 60px 20px;
            text-align: center;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
        }

        header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            font-size: 16px;
            opacity: 0.8;
            max-width: 600px;
            margin: 0 auto;
        }

        .container {
            max-width: 800px;
            margin: -40px auto 40px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .rules-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 40px;
            box-shadow: var(--shadow);
        }

        .rules-section {
            margin-bottom: 35px;
        }

        .rules-section:last-child {
            margin-bottom: 0;
        }

        .rules-section h2 {
            color: var(--primary-color);
            font-size: 22px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #edf2f7;
        }

        .rules-section h2 i {
            color: var(--accent-color);
        }

        .rules-list {
            list-style: none;
        }

        .rules-list li {
            position: relative;
            padding-left: 30px;
            margin-bottom: 12px;
            color: var(--text-muted);
        }

        .rules-list li::before {
            content: '\f058';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            left: 0;
            top: 2px;
            color: var(--accent-color);
            font-size: 16px;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .rules-card {
                padding: 25px;
            }

            header h1 {
                font-size: 28px;
            }
        }

        .pdf-container {
            width: 100%;
            height: 70vh;
            min-height: 500px;
            border-radius: 8px;
            overflow-y: auto;
            overflow-x: hidden;
            box-shadow: inset 0 4px 6px rgba(0, 0, 0, 0.05);
            background-color: #cbd5e1;
            border: 1px solid #94a3b8;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .pdf-page-canvas {
            background-color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            max-width: 95%;
            height: auto !important;
            border-radius: 4px;
        }

        .pdf-fallback {
            text-align: center;
            padding: 20px;
            background: #f8fafc;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px dashed #cbd5e1;
            font-size: 15px;
        }

        .pdf-fallback p {
            margin-bottom: 15px;
            color: var(--text-muted);
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--accent-color), #0083b0);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 180, 219, 0.3);
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 180, 219, 0.4);
            color: white;
        }
    </style>
</head>

<body>

    <header>
        <a href="index.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Kembali
        </a>
        <h1>Tata Tertib MTs Al Fatah Talun</h1>
        <p>Pedoman kedisiplinan dan tata tertib siswa</p>
    </header>

    <div class="container">
        <div class="rules-card">

            <div class="rules-section">

                <div id="pdf-render-container" class="pdf-container">
                    <div style="padding: 40px; text-align: center; color: #475569;">
                        <i class="fa-solid fa-circle-notch fa-spin fa-2x"
                            style="margin-bottom: 10px; color: var(--accent-color);"></i>
                        <p>Memuat dokumen PDF...</p>
                    </div>
                </div>

                <div class="pdf-fallback">
                    <a href="TATIB.pdf" download="Tata_Tertib_MTs_Al_Fatah_Talun.pdf" class="download-btn">
                        <i class="fa-solid fa-download"></i> Unduh File PDF
                    </a>
                </div>
            </div>

        </div>
    </div>

    <!-- PDF.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Setup worker PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const url = 'TATIB.pdf';
        const container = document.getElementById('pdf-render-container');

        // Asynchronously download PDF
        const loadingTask = pdfjsLib.getDocument(url);
        loadingTask.promise.then(function (pdf) {
            container.innerHTML = ''; // Hapus teks loading

            // Loop untuk setiap halaman
            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                // Buat elemen canvas
                const canvas = document.createElement('canvas');
                canvas.className = 'pdf-page-canvas';
                container.appendChild(canvas);

                // Render halaman ke canvas
                pdf.getPage(pageNum).then(function (page) {
                    const viewportMobile = page.getViewport({ scale: 1 });

                    // Hitung skala agar sesuai lebar container
                    let scale = (container.clientWidth * 0.95) / viewportMobile.width;
                    if (scale > 1.5) scale = 1.5; // Batasi zoom di desktop

                    const viewport = page.getViewport({ scale: scale });
                    const ctx = canvas.getContext('2d');

                    // Resolusi tinggi untuk layar tajam
                    const outputScale = window.devicePixelRatio || 1;
                    canvas.width = Math.floor(viewport.width * outputScale);
                    canvas.height = Math.floor(viewport.height * outputScale);
                    canvas.style.width = Math.floor(viewport.width) + "px";
                    canvas.style.height = Math.floor(viewport.height) + "px";

                    const renderContext = {
                        canvasContext: ctx,
                        transform: [outputScale, 0, 0, outputScale, 0, 0],
                        viewport: viewport
                    };
                    page.render(renderContext);
                });
            }
        }).catch(function (error) {
            console.error('Error loading PDF: ', error);
            container.innerHTML = '<div style="padding: 20px; text-align: center; color: #ef4444;"><i class="fa-solid fa-circle-exclamation fa-2x" style="margin-bottom: 10px;"></i><p>Gagal memuat dokumen. Silakan unduh menggunakan tombol di bawah.</p></div>';
        });
    </script>

    <footer>
        <p>&copy; 2026 MTs Al Fatah Talun. All rights reserved.</p>
    </footer>

    <script src="protection.js"></script>
</body>

</html>
